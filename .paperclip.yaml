schema: "paperclip/v1"
agents:
  ceo:
    role: "ceo"
    capabilities: "CEO de Humanio Marketing. Coordina Scout, Qualifier, WebDesigner, Outreach y DataAnalyst. Asigna tareas de prospección, aprueba propuestas, monitorea pipeline. Cuando recibe 'prospectar {giro} en {ciudad}', crea ticket para Scout."
    adapter:
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-5-20250929"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
  dataanalyst:
    role: "researcher"
    icon: "database"
    capabilities: "Experto en evaluación y análisis de datos, creación de reportes y tableros de control, indicadores, OKRs. Identifica oportunidades de mercado a través de análisis de datos."
    adapter:
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-5-20250929"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
        maxConcurrentRuns: 1
  outreach:
    role: "general"
    capabilities: "Especialista en prospección comercial de Humanio Marketing. Recibe prospectos con sitio publicado en Surge.sh, descarga propuesta y reporte HTML, genera draft de correo, mensaje de WhatsApp y script de llamada, sube los 5 archivos a Google Drive y notifica al CEO con los URLs."
    adapter:
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-5-20250929"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
        maxConcurrentRuns: 1
    inputs:
      env:
        FROM_EMAIL:
          description: "Provide FROM_EMAIL for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        FROM_NAME:
          description: "Provide FROM_NAME for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        GOOGLE_CLIENT_ID:
          description: "Provide GOOGLE_CLIENT_ID for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        GOOGLE_CLIENT_SECRET:
          description: "Provide GOOGLE_CLIENT_SECRET for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        GOOGLE_DRIVE_FOLDER_ID:
          description: "Provide GOOGLE_DRIVE_FOLDER_ID for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        GOOGLE_REFRESH_TOKEN:
          description: "Provide GOOGLE_REFRESH_TOKEN for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        SMTP_HOST:
          description: "Provide SMTP_HOST for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        SMTP_PASS:
          description: "Provide SMTP_PASS for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        SMTP_PORT:
          description: "Provide SMTP_PORT for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        SMTP_USER:
          description: "Provide SMTP_USER for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        TELEFONO_MIGUEL:
          description: "Provide TELEFONO_MIGUEL for agent outreach"
          kind: "secret"
          default: ""
          requirement: "optional"
        WHATSAPP_PHONE_NUMBER_ID:
          description: "Meta WhatsApp Business phone number ID"
          kind: "secret"
          default: ""
          requirement: "optional"
        WHATSAPP_CLOUD_API_TOKEN:
          description: "Meta WhatsApp Business Cloud API permanent token"
          kind: "secret"
          default: ""
          requirement: "optional"
  qualifier:
    role: "general"
    capabilities: "Analista SEO y calificador de prospectos de Humanio Marketing. Recibe reportes de Scout con listas de negocios locales, evalúa su presencia digital, calcula un score de oportunidad (1-10) y genera diagnósticos HTML visuales para los prospectos con score ≥ 6. Crea tickets para WebDesigner con briefs completos."
    adapter:
      config:
        model: "claude-sonnet-4-5-20250929"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
        maxConcurrentRuns: 1
    inputs:
      env:
        FIRECRAWL_API_KEY:
          description: "Firecrawl API key — requerida para analizar sitios web de prospectos"
          kind: "secret"
          default: ""
          requirement: "required"
        FIRECRAWL_MCP_URL:
          description: "URL del MCP server de Firecrawl — formato: https://mcp.firecrawl.dev/{TOKEN}/v2/mcp"
          kind: "secret"
          default: ""
          requirement: "required"
  scout:
    role: "general"
    capabilities: "Especialista en prospección de negocios locales. Recibe país, ciudad y giro comercial, realiza investigación exhaustiva en Google Maps, directorios, redes sociales y web para generar listas detalladas de prospectos con todos sus datos de contacto. Entrega reportes estructurados al agente Qualifier para calificación."
    adapter:
      config:
        model: "claude-sonnet-4-5-20250929"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
        maxConcurrentRuns: 1
    inputs:
      env:
        FIRECRAWL_API_KEY:
          description: "Firecrawl API key — requerida para buscar y scrape de negocios locales"
          kind: "secret"
          default: ""
          requirement: "required"
        FIRECRAWL_MCP_URL:
          description: "URL del MCP server de Firecrawl — formato: https://mcp.firecrawl.dev/{TOKEN}/v2/mcp"
          kind: "secret"
          default: ""
          requirement: "required"
  webdesigner:
    role: "general"
    capabilities: "Diseñador web premium de Humanio Marketing. Recibe briefs del Qualifier y genera sitios web de 3 páginas (presentación, propuesta comercial, reporte SEO) en HTML/CSS/JS vanilla con estilos visuales únicos por prospecto. Publica en Surge.sh y crea ticket para Outreach al terminar."
    adapter:
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-5-20250929"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
        maxConcurrentRuns: 1
    inputs:
      env:
        SURGE_TOKEN:
          description: "Surge.sh deploy token — obtener con `surge token` en terminal"
          kind: "secret"
          default: ""
          requirement: "required"
        PEXELS_API_KEY:
          description: "Pexels API key para imágenes hero de los sitios — pexels.com/api"
          kind: "secret"
          default: ""
          requirement: "required"
        TWENTY_FIRST_API_KEY:
          description: "21st.dev API key para componentes UI premium opcionales — 21st.dev"
          kind: "secret"
          default: ""
          requirement: "optional"
company:
  logoPath: "images/company-logo.png"
projects:
  onboarding:
    color: "#6366f1"
    status: "in_progress"
routines:
  qualifier-revisar-tickets-pendientes:
    status: "active"
    triggers:
      -
        kind: "schedule"
        cronExpression: "10 * * * *"
        label: "schedule"
        timezone: "America/Mazatlan"
      -
        kind: "schedule"
        cronExpression: "10 * * * *"
        label: "schedule-2"
        timezone: "America/Mazatlan"
  dataanalyst-pipeline-semanal:
    status: "active"
    triggers:
      -
        kind: "schedule"
        cronExpression: "0 9 * * 1"
        label: "weekly-monday-9am"
        timezone: "America/Mazatlan"
  webdesigner-revisar-briefs-pendientes:
    status: "active"
    triggers:
      -
        kind: "schedule"
        cronExpression: "10 * * * *"
        label: "schedule"
        timezone: "America/Mazatlan"
sidebar:
  agents:
    - "ceo"
    - "dataanalyst"
    - "outreach"
    - "qualifier"
    - "scout"
    - "webdesigner"
  projects:
    - "onboarding"
